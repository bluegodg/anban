<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>安伴子女端</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="连接">
        <div>
          <p class="eyebrow">AnBan V0.1</p>
          <h1>子女端控制台</h1>
        </div>
        <form id="connectForm" class="connect">
          <label>
            <span>访问码</span>
            <input id="accessCode" name="accessCode" autocomplete="current-password">
          </label>
          <label>
            <span>设备 ID</span>
            <input id="deviceId" name="deviceId" autocomplete="off">
          </label>
          <label>
            <span>后端地址</span>
            <input id="apiBaseURL" name="apiBaseURL" placeholder="http://localhost:8090">
          </label>
          <button type="submit">连接</button>
        </form>
      </section>

      <section class="dashboard" aria-label="今日状态">
        <div id="statusPanel" class="status-panel">
          <div class="device-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p>设备状态</p>
            <h2 id="statusText">未连接</h2>
            <small id="lastInteraction">等待访问码</small>
          </div>
        </div>

        <section class="panel message-panel" aria-label="留言">
          <header>
            <p>留言</p>
            <span>最多 100 字</span>
          </header>
          <form id="messageForm">
            <label>
              <span>发送人</span>
              <input id="fromName" name="fromName" value="小明">
            </label>
            <label>
              <span>留言内容</span>
              <textarea id="messageText" name="messageText" maxlength="100" rows="4">妈，我下班路过老张家了，他说让你有空过去喝茶。</textarea>
            </label>
            <button type="submit">发送留言</button>
          </form>
          <ul id="messageList" class="message-list"></ul>
        </section>

        <section class="panel actions-panel" aria-label="主动陪伴">
          <header>
            <p>主动陪伴</p>
            <span>问候 · 视觉 · 提醒</span>
          </header>
          <button id="greetingButton" type="button">触发问候</button>
          <button id="visionButton" type="button">看一眼</button>
          <output id="visionResult" class="vision-result" aria-live="polite">等待看一眼</output>
          <button id="visionPresenceButton" type="button">视觉触发</button>
          <output id="visionPresenceResult" class="vision-result" aria-live="polite">等待视觉触发</output>
          <form id="greetingScheduleForm" class="schedule-form">
            <div class="schedule-row">
              <label>
                <span>早问候</span>
                <input id="morningGreetingTime" name="morningGreetingTime" type="time" value="08:00">
              </label>
              <label class="checkline">
                <input id="morningGreetingEnabled" name="morningGreetingEnabled" type="checkbox" checked>
                <span>启用</span>
              </label>
              <label>
                <span>口吻</span>
                <select id="morningGreetingTone" name="morningGreetingTone">
                  <option value="warm">温暖</option>
                  <option value="casual">轻松</option>
                </select>
              </label>
            </div>
            <div class="schedule-row">
              <label>
                <span>午问候</span>
                <input id="noonGreetingTime" name="noonGreetingTime" type="time" value="12:30">
              </label>
              <label class="checkline">
                <input id="noonGreetingEnabled" name="noonGreetingEnabled" type="checkbox" checked>
                <span>启用</span>
              </label>
              <label>
                <span>口吻</span>
                <select id="noonGreetingTone" name="noonGreetingTone">
                  <option value="warm">温暖</option>
                  <option value="casual">轻松</option>
                </select>
              </label>
            </div>
            <div class="schedule-row">
              <label>
                <span>晚问候</span>
                <input id="eveningGreetingTime" name="eveningGreetingTime" type="time" value="18:00">
              </label>
              <label class="checkline">
                <input id="eveningGreetingEnabled" name="eveningGreetingEnabled" type="checkbox" checked>
                <span>启用</span>
              </label>
              <label>
                <span>口吻</span>
                <select id="eveningGreetingTone" name="eveningGreetingTone">
                  <option value="warm">温暖</option>
                  <option value="casual">轻松</option>
                </select>
              </label>
            </div>
            <button type="submit">保存问候时段</button>
          </form>
          <form id="reminderForm">
            <label>
              <span>提醒时间</span>
              <input id="reminderTime" name="reminderTime" type="datetime-local">
            </label>
            <label>
              <span>提醒内容</span>
              <input id="reminderContent" name="reminderContent" value="该测血压啦">
            </label>
            <button type="submit">创建提醒</button>
          </form>
          <ul id="reminderList" class="reminder-list"></ul>
        </section>

        <section class="panel profile-panel" aria-label="家庭画像">
          <header>
            <p>家庭画像</p>
            <span id="profileSummary">王阿姨 · 喜欢豫剧</span>
          </header>
          <form id="profileForm">
            <label>
              <span>老人本名</span>
              <input name="elderName" value="王秀英">
            </label>
            <label>
              <span>常用称呼</span>
              <input name="nickname" value="妈">
            </label>
            <label>
              <span>子女</span>
              <input name="children" value="小明, 小红">
            </label>
            <label>
              <span>孙辈</span>
              <input name="grandchildren" value="小宝（7岁）">
            </label>
            <label>
              <span>喜好</span>
              <input name="hobby" value="豫剧, 下棋">
            </label>
            <label>
              <span>作息</span>
              <input name="schedule" value="早 6 点起，晚 9 点睡">
            </label>
            <label>
              <span>健康背景</span>
              <input name="health" value="高血压、轻度糖尿病">
            </label>
            <label>
              <span>忌口</span>
              <input name="taboos" value="甜食">
            </label>
            <button type="submit">同步画像</button>
          </form>
        </section>
      </section>

      <output id="notice" class="notice" aria-live="polite"></output>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
